databases:
  - name: proctorai-db
    plan: free
    databaseName: proctorai
    user: proctorai_user

services:
  - type: web
    name: proctorai-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: proctorai-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.6"
